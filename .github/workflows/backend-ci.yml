name: Backend CI

on:
  pull_request:
    branches: [ "dev", "staging", "main" ]
    paths:
      - "backend/**"
  push:
    branches: [ "dev", "staging", "main" ]
    paths:
      - "backend/**"

jobs:
  test:
    name: backend-tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/bank-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run tests
        run: ./mvnw -q test

      - name: Package (optional)
        run: ./mvnw -q -DskipTests package
