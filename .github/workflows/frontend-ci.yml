name: Frontend CI

on:
  pull_request:
    branches: [ "dev", "staging", "main" ]
    paths:
      - "frontend/**"
  push:
    branches: [ "dev", "staging", "main" ]
    paths:
      - "frontend/**"

jobs:
  build:
    name: frontend-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
